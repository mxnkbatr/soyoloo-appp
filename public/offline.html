<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Soyol Shop - Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(160deg, #1C1C1E 0%, #2C2C2E 50%, #1C1C1E 100%);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-user-select: none;
      user-select: none;
    }
    .container {
      text-align: center;
      max-width: 340px;
      animation: fadeIn 0.6s ease-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .icon-wrapper {
      width: 100px;
      height: 100px;
      margin: 0 auto 28px;
      background: rgba(255, 80, 0, 0.12);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pulse 2.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 80, 0, 0.2); }
      50% { transform: scale(1.05); box-shadow: 0 0 0 12px rgba(255, 80, 0, 0); }
    }
    .icon-wrapper svg {
      width: 44px;
      height: 44px;
      color: #FF5000;
    }
    h1 {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #FF5000, #FF8C42);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.55);
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .retry-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, #FF5000, #FF6B35);
      color: #fff;
      border: none;
      border-radius: 100px;
      padding: 14px 32px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(255, 80, 0, 0.3);
      transition: all 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .retry-btn:active {
      transform: scale(0.96);
      box-shadow: 0 4px 12px rgba(255, 80, 0, 0.2);
    }
    .retry-btn svg {
      width: 16px;
      height: 16px;
    }
    .retry-btn.loading svg {
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon-wrapper">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="1" y1="1" x2="23" y2="23"/>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
        <line x1="12" y1="20" x2="12.01" y2="20"/>
      </svg>
    </div>
    <h1>Интернэт холболтгүй</h1>
    <p>Таны төхөөрөмж интернэтэд холбогдоогүй байна. Wi-Fi эсвэл мобайл дата асааж дахин оролдоно уу.</p>
    <button class="retry-btn" onclick="retry(this)">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"/>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
      Дахин оролдох
    </button>
  </div>
  <script>
    function retry(btn) {
      btn.classList.add('loading');
      setTimeout(() => { window.location.reload(); }, 500);
    }
  </script>
</body>
</html>
